<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Owner Login | StudentNest</title>

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">

    <!-- Main CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body class="antialiased bg-[#0d0d0f] text-white font-sans">

<div class="min-h-screen flex items-center justify-center px-6">

    <div class="glass p-10 rounded-[3rem] w-full max-w-md border border-white/10 shadow-xl relative">

        <!-- Back -->
        <a href="{{ url_for('index_page') }}"
           class="absolute top-6 left-6 text-gray-500 hover:text-white text-sm">
            ← Back to Category
        </a>

        <h2 class="text-3xl font-extrabold mb-2 text-center">
            Owner Login
        </h2>

        <p class="text-sm text-gray-500 mb-8 text-center italic">
            Manage your houses & rooms
        </p>

        <!-- OWNER LOGIN FORM -->
        <form method="POST" action="{{ url_for('owner_login') }}" class="space-y-4">

            <div>
                <label class="text-[10px] text-gray-500 font-black uppercase mb-2 block tracking-widest">
                    Email Address
                </label>
                <input type="email" name="email" required
                    class="w-full bg-white/5 p-4 rounded-xl border border-white/10 outline-none focus:border-indigo-400 transition">
            </div>

            <div>
                <label class="text-[10px] text-gray-500 font-black uppercase mb-2 block tracking-widest">
                    Password
                </label>
                <input type="password" name="password" required minlength="6"
                    class="w-full bg-white/5 p-4 rounded-xl border border-white/10 outline-none focus:border-indigo-400 transition">
            </div>

            <button type="submit"
                class="w-full py-4 mt-4 rounded-xl font-black uppercase tracking-widest text-sm text-white owner-gradient shadow-xl">
                Login
            </button>

        </form>

        <p class="text-[10px] text-gray-500 text-center mt-6">
            New owner?
            <a href="{{ url_for('owner_register') }}" class="text-indigo-400 font-bold hover:underline">
                Create an account
            </a>
        </p>

    </div>
</div>

</body>
</html>
