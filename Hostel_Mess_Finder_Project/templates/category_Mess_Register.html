<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Mess Registration | StudentNest</title>

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">

    <!-- Main CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body class="antialiased bg-[#0d0d0f] text-white font-sans">

<div class="min-h-screen flex items-center justify-center px-6">

    <div class="glass p-10 rounded-[3rem] w-full max-w-md border border-white/10 shadow-xl">

        <h2 class="text-3xl font-extrabold mb-2 text-center">
            Mess Registration
        </h2>

        <p class="text-sm text-gray-500 mb-8 text-center italic">
            List your mess & manage menu
        </p>

        <form method="POST" action="{{ url_for('mess_register_page') }}" class="space-y-4">

            <div>
                <label class="text-[10px] text-gray-500 font-black uppercase mb-2 block tracking-widest">
                    Mess Name
                </label>
                <input type="text" name="name" required
                    class="w-full bg-white/5 p-4 rounded-xl border border-white/10 outline-none focus:border-blue-400 transition">
            </div>

            <div>
                <label class="text-[10px] text-gray-500 font-black uppercase mb-2 block tracking-widest">
                    Email Address
                </label>
                <input type="email" name="email" required
                    class="w-full bg-white/5 p-4 rounded-xl border border-white/10 outline-none focus:border-blue-400 transition">
            </div>

            <div>
                <label class="text-[10px] text-gray-500 font-black uppercase mb-2 block tracking-widest">
                    Phone Number
                </label>
                <input type="tel" name="phone" required
                    class="w-full bg-white/5 p-4 rounded-xl border border-white/10 outline-none focus:border-blue-400 transition">
            </div>

            <div>
                <label class="text-[10px] text-gray-500 font-black uppercase mb-2 block tracking-widest">
                    Password
                </label>
                <input type="password" name="password" required minlength="6"
                    class="w-full bg-white/5 p-4 rounded-xl border border-white/10 outline-none focus:border-blue-400 transition">
            </div>

            <button
                class="w-full py-4 mt-4 rounded-xl font-black uppercase tracking-widest text-sm text-white mess-gradient shadow-xl">
                Register
            </button>
        </form>

        <p class="text-[10px] text-gray-500 text-center mt-6">
            Already registered?
            <a href="{{ url_for('mess_login_page') }}" class="text-blue-400 font-bold hover:underline">
                Login
            </a>
        </p>

    </div>
</div>

</body>
</html>
