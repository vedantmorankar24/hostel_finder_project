<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Login | StudentNest</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #0d0d0f; overflow: hidden; }
        
        .glass {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        /* Subtle moving background */
        .bg-animate {
            background: radial-gradient(circle at 50% 50%, #134e4a 0%, #0d0d0f 100%);
            animation: pulse 8s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.2); opacity: 0.8; }
        }

        /* Input field glow on focus */
        .input-focus:focus {
            border-color: #2dd4bf;
            box-shadow: 0 0 15px rgba(45, 212, 191, 0.2);
            background: rgba(255, 255, 255, 0.05);
        }

        /* Shimmer effect for button */
        .btn-shimmer {
            position: relative;
            overflow: hidden;
            background: linear-gradient(90deg, #14b8a6, #0d9488);
            transition: all 0.3s ease;
        }

        .btn-shimmer::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.1), transparent);
            transform: rotate(45deg);
            transition: 0.5s;
        }

        .btn-shimmer:hover::after {
            left: 100%;
        }

        .btn-shimmer:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(20, 184, 166, 0.3);
        }
    </style>
</head>

<body class="min-h-screen flex items-center justify-center p-6 relative">

    <div class="fixed inset-0 bg-animate -z-10"></div>
    <div class="fixed top-[-10%] right-[-10%] w-[500px] h-[500px] bg-teal-500/10 blur-[120px] rounded-full"></div>

    <div class="glass p-10 md:p-14 rounded-[3.5rem] w-full max-w-md relative animate-in fade-in zoom-in duration-700">
        
        <a href="{{ url_for('index_page') }}" class="absolute top-8 left-10 text-[10px] font-bold text-gray-500 hover:text-teal-400 transition-colors uppercase tracking-widest flex items-center gap-2">
            <span>←</span> Back
        </a>

        <div class="text-center mb-10 mt-4">
            <div class="inline-block p-4 rounded-2xl bg-teal-500/10 mb-6">
                <span class="text-3xl">🎓</span>
            </div>
            <h2 class="text-3xl font-black text-white tracking-tight uppercase">Student <span class="text-teal-400">Login</span></h2>
            <p class="text-xs text-gray-500 mt-2 font-medium tracking-wide">Enter your credentials to access your nest</p>
        </div>

        <form method="POST" action="{{ url_for('student_login_page') }}" class="space-y-6">
            
            <div class="space-y-2">
                <label class="text-[10px] text-gray-500 font-black uppercase tracking-[0.2em] ml-1">Email Space</label>
                <input type="email" name="email" required
                    placeholder="name@university.com"
                    class="w-full bg-white/5 p-4 rounded-2xl border border-white/10 text-white outline-none input-focus transition-all placeholder:text-gray-700">
            </div>

            <div class="space-y-2">
                <div class="flex justify-between items-center px-1">
                    <label class="text-[10px] text-gray-500 font-black uppercase tracking-[0.2em]">Security Key</label>
                    <a href="#" class="text-[9px] text-gray-600 hover:text-teal-500 uppercase font-bold tracking-tighter">Forgot?</a>
                </div>
                <input type="password" name="password" required minlength="6"
                    placeholder="••••••••"
                    class="w-full bg-white/5 p-4 rounded-2xl border border-white/10 text-white outline-none input-focus transition-all placeholder:text-gray-700">
            </div>

            <button type="submit"
                class="w-full py-5 rounded-2xl font-black uppercase tracking-[0.2em] text-xs text-white btn-shimmer active:scale-95">
                Authenticate
            </button>

        </form>

        <div class="mt-10 pt-8 border-t border-white/5 text-center">
            <p class="text-[10px] text-gray-600 uppercase font-bold tracking-widest">
                Don't have an identity yet? 
                <a href="{{ url_for('student_register_page') }}" class="text-teal-400 hover:text-teal-300 ml-1 underline decoration-teal-500/30 underline-offset-4">Register</a>
            </p>
        </div>

    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
