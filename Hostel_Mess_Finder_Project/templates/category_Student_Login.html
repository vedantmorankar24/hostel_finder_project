<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Login | StudentNest</title>
    
    <!-- Tailwind (for layout + utility classes) -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">

    <!-- Your original CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="antialiased bg-[#0d0d0f] text-white font-sans">

    <!-- Full-screen wrapper -->
    <div class="min-h-screen flex items-center justify-center px-6">

        <!-- Glass Login Card -->
        <div class="glass p-10 rounded-[3rem] w-full max-w-md border border-white/10 shadow-xl">

            <!-- Back Button -->
            <a href="{{ url_for('index_page') }}" class="absolute top-6 left-6 text-gray-500 hover:text-white text-sm">
                ← Back to Category
            </a>

            <h2 class="text-3xl font-extrabold mb-2 text-center">
                Student Login
            </h2>
            <p class="text-sm text-gray-500 mb-8 text-center italic">
                Login to find hostels & mess
            </p>

            <!-- Login Form -->
            <form method="POST" action="{{ url_for('student_login_page') }}" class="space-y-4">

                <!-- Email -->
                <div>
                    <label class="text-[10px] text-gray-500 font-black uppercase mb-2 block tracking-widest">
                        Email Address
                    </label>
                    <input type="email" name="email" required
                        class="w-full bg-white/5 p-4 rounded-xl border border-white/10 outline-none focus:border-teal-400 transition">
                </div>

                <!-- Password -->
                <div>
                    <label class="text-[10px] text-gray-500 font-black uppercase mb-2 block tracking-widest">
                        Password
                    </label>
                    <input type="password" name="password" required minlength="6"
                        class="w-full bg-white/5 p-4 rounded-xl border border-white/10 outline-none focus:border-teal-400 transition">
                </div>

                <!-- Submit Button -->
                <button type="submit"
                    class="w-full py-4 mt-4 rounded-xl font-black uppercase tracking-widest text-sm text-white student-gradient shadow-xl">
                    Login
                </button>

            </form>

            <!-- Registration Hint -->
            <p class="text-[10px] text-gray-500 text-center mt-6">
                New student?
                <a href="{{ url_for('student_register_page') }}" class="text-teal-400 font-bold hover:underline">
                    Create an account
                </a>
            </p>

        </div>
    </div>
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
