<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join StudentNest | Registration</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #0d0d0f; }
        
        .glass {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .bg-glow {
            background: radial-gradient(circle at 30% 30%, #134e4a 0%, #0d0d0f 100%);
        }

        /* Input field animations */
        .field-container {
            position: relative;
            transition: transform 0.3s ease;
        }
        .field-container:focus-within {
            transform: translateX(10px);
        }

        .input-focus:focus {
            border-color: #2dd4bf;
            background: rgba(45, 212, 191, 0.05);
            box-shadow: -5px 0 15px rgba(45, 212, 191, 0.1);
        }

        /* Submit Button Shimmer */
        .btn-join {
            background: linear-gradient(90deg, #14b8a6, #0d9488);
            position: relative;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
        }
        .btn-join:hover {
            letter-spacing: 2px;
            box-shadow: 0 0 30px rgba(20, 184, 166, 0.4);
        }
        
        /* Entrance animation */
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-card { animation: slideUp 0.8s ease-out forwards; }
    </style>
</head>

<body class="min-h-screen flex items-center justify-center p-6 bg-glow relative overflow-x-hidden">

    <div class="fixed bottom-[-10%] left-[-10%] w-[600px] h-[600px] bg-teal-900/20 blur-[150px] rounded-full -z-10"></div>

    <div class="glass p-10 md:p-14 rounded-[3.5rem] w-full max-w-lg animate-card relative">
        
        <a href="/student/login" class="absolute top-10 left-10 text-[10px] font-black text-gray-500 hover:text-teal-400 transition-colors uppercase tracking-[0.3em] flex items-center gap-2">
            <span>←</span> Step back
        </a>

        <div class="text-center mb-10 mt-6">
            <h2 class="text-4xl font-black text-white tracking-tight uppercase">New <span class="text-teal-400">Account</span></h2>
            <p class="text-[11px] text-gray-500 mt-3 font-bold uppercase tracking-[0.2em]">Begin your journey with StudentNest</p>
        </div>

        <form method="POST" action="/student/register/submit" class="grid grid-cols-1 gap-5">
            
            <div class="field-container space-y-1">
                <label class="text-[9px] text-gray-600 font-black uppercase tracking-widest ml-1">Legal Name</label>
                <input type="text" name="name" required placeholder="John Doe"
                    class="w-full bg-white/5 p-4 rounded-2xl border border-white/10 text-white outline-none input-focus transition-all placeholder:text-gray-800">
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="field-container space-y-1">
                    <label class="text-[9px] text-gray-600 font-black uppercase tracking-widest ml-1">Email</label>
                    <input type="email" name="email" required placeholder="mail@uni.com"
                        class="w-full bg-white/5 p-4 rounded-2xl border border-white/10 text-white outline-none input-focus transition-all placeholder:text-gray-800">
                </div>

                <div class="field-container space-y-1">
                    <label class="text-[9px] text-gray-600 font-black uppercase tracking-widest ml-1">Contact</label>
                    <input type="tel" name="phone" required placeholder="+91..."
                        class="w-full bg-white/5 p-4 rounded-2xl border border-white/10 text-white outline-none input-focus transition-all placeholder:text-gray-800">
                </div>
            </div>

            <div class="field-container space-y-1">
                <label class="text-[9px] text-gray-600 font-black uppercase tracking-widest ml-1">Create Password</label>
                <input type="password" name="password" required minlength="6" placeholder="Min. 6 Characters"
                    class="w-full bg-white/5 p-4 rounded-2xl border border-white/10 text-white outline-none input-focus transition-all placeholder:text-gray-800">
            </div>

            <button type="submit"
                class="w-full py-5 mt-4 rounded-2xl font-black uppercase tracking-[0.3em] text-xs text-white btn-join shadow-2xl active:scale-95">
                Initialize Profile
            </button>
        </form>

        <div class="mt-10 text-center">
            <p class="text-[10px] text-gray-600 uppercase font-black tracking-widest">
                System already has your data? 
                <a href="/student/login" class="text-teal-400 hover:text-white transition-colors ml-1">Login Identity</a>
            </p>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
