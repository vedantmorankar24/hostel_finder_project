<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Owner Login | StudentNest</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #0d0d0f; overflow: hidden; }
        
        .glass {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        /* Ambient Indigo Animation */
        .bg-indigo-pulse {
            background: radial-gradient(circle at 50% 50%, #1e1b4b 0%, #0d0d0f 100%);
            animation: pulse-slow 10s ease-in-out infinite;
        }

        @keyframes pulse-slow {
            0%, 100% { transform: scale(1); opacity: 0.6; }
            50% { transform: scale(1.1); opacity: 0.9; }
        }

        /* Input field glow */
        .input-indigo:focus {
            border-color: #818cf8;
            box-shadow: 0 0 20px rgba(129, 140, 248, 0.15);
            background: rgba(255, 255, 255, 0.05);
        }

        /* Button Shimmer */
        .btn-indigo-shimmer {
            background: linear-gradient(90deg, #6366f1, #4f46e5);
            position: relative;
            overflow: hidden;
            transition: all 0.3s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .btn-indigo-shimmer::after {
            content: '';
            position: absolute;
            top: -50%; left: -50%; width: 200%; height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.1), transparent);
            transform: rotate(45deg);
            transition: 0.6s;
        }

        .btn-indigo-shimmer:hover::after { left: 100%; }
        .btn-indigo-shimmer:hover { transform: translateY(-2px); box-shadow: 0 10px 25px rgba(99, 102, 241, 0.3); }

        .animate-zoom-in { animation: zoomIn 0.5s ease-out forwards; }
        @keyframes zoomIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</head>

<body class="min-h-screen flex items-center justify-center p-6 relative">

    <div class="fixed inset-0 bg-indigo-pulse -z-10"></div>
    <div class="fixed top-[-15%] left-[-10%] w-[600px] h-[600px] bg-indigo-600/10 blur-[130px] rounded-full"></div>

    <div class="glass p-10 md:p-14 rounded-[3.5rem] w-full max-w-md relative animate-zoom-in">
        
        <a href="{{ url_for('index_page') }}" class="absolute top-8 left-10 text-[10px] font-black text-gray-500 hover:text-indigo-400 transition-colors uppercase tracking-[0.3em] flex items-center gap-2">
            <span>←</span> Exit to Portal
        </a>

        <div class="text-center mb-10 mt-6">
            <div class="inline-flex items-center justify-center w-16 h-16 bg-indigo-500/10 rounded-2xl mb-6 border border-indigo-500/20 shadow-inner">
                <span class="text-3xl">🏠</span>
            </div>
            <h2 class="text-3xl font-black text-white tracking-tighter uppercase">Owner <span class="text-indigo-400">Login</span></h2>
            <p class="text-[11px] text-gray-500 mt-2 font-bold uppercase tracking-widest">Access your property dashboard</p>
        </div>

        <form method="POST" action="{{ url_for('owner_login') }}" class="space-y-6">
            
            <div class="space-y-2">
                <label class="text-[9px] text-gray-500 font-black uppercase tracking-[0.2em] ml-1">Owner Credentials</label>
                <input type="email" name="email" required
                    placeholder="registered@email.com"
                    class="w-full bg-white/5 p-4 rounded-2xl border border-white/10 text-white outline-none input-indigo transition-all placeholder:text-gray-700">
            </div>

            <div class="space-y-2">
                <div class="flex justify-between items-center px-1">
                    <label class="text-[9px] text-gray-500 font-black uppercase tracking-[0.2em]">Secret Key</label>
                    <a href="#" class="text-[9px] text-indigo-500 hover:text-white uppercase font-bold tracking-tighter transition-colors">Recover Access</a>
                </div>
                <input type="password" name="password" required minlength="6"
                    placeholder="••••••••"
                    class="w-full bg-white/5 p-4 rounded-2xl border border-white/10 text-white outline-none input-indigo transition-all placeholder:text-gray-700">
            </div>

            <button type="submit"
                class="w-full py-5 mt-2 rounded-2xl font-black uppercase tracking-[0.2em] text-xs text-white btn-indigo-shimmer active:scale-95">
                Verify & Enter
            </button>
        </form>

        <div class="mt-10 pt-8 border-t border-white/5 text-center">
            <p class="text-[10px] text-gray-600 uppercase font-bold tracking-[0.2em]">
                New Partner? 
                <a href="{{ url_for('owner_register') }}" class="text-indigo-400 hover:text-indigo-300 ml-1 underline underline-offset-4 decoration-indigo-500/30">Register Asset</a>
            </p>
        </div>

    </div>

    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
