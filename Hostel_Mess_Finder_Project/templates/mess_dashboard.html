<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Owner Dashboard | StudentNest</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }
        .gradient-border {
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .gradient-border:focus-within {
            border-color: #3b82f6;
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.2);
        }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #1e3a8a; border-radius: 10px; }
    </style>
</head>

<body class="bg-[#0d0d0f] text-gray-200 min-h-screen selection:bg-blue-500/30">

    <div class="fixed top-0 left-0 w-96 h-96 bg-blue-600/10 rounded-full blur-[120px] -z-10"></div>
    <div class="fixed bottom-0 right-0 w-96 h-96 bg-cyan-600/10 rounded-full blur-[120px] -z-10"></div>

    <div class="flex min-h-screen">

        <aside class="w-1/3 glass p-10 border-r border-white/5 sticky top-0 h-screen overflow-y-auto">
            <div class="flex items-center gap-2 mb-8">
                <div class="w-8 h-8 bg-blue-500 rounded-lg shadow-lg shadow-blue-500/30"></div>
                <h1 class="text-xl font-bold tracking-tight text-white uppercase">Student<span class="text-blue-500">Nest</span></h1>
            </div>

            <h2 class="text-3xl font-bold mb-2 text-white">Register Mess</h2>
            <p class="text-gray-400 text-sm mb-8">List your mess facility to reach thousands of students.</p>

            <form method="POST" action="{{ url_for('add_mess') }}" class="space-y-5">
                <div>
                    <label class="text-[10px] font-bold text-gray-500 uppercase ml-1 tracking-widest">General Info</label>
                    <input type="text" name="name" placeholder="Mess Name" class="w-full mt-2 p-3 rounded-xl bg-white/5 border border-white/10 focus:border-blue-500 outline-none transition-all" required>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <input type="email" name="email" placeholder="Email" class="w-full p-3 rounded-xl bg-white/5 border border-white/10 focus:border-blue-500 outline-none transition-all" required>
                    <input type="tel" name="phone" placeholder="Contact No." class="w-full p-3 rounded-xl bg-white/5 border border-white/10 focus:border-blue-500 outline-none transition-all" required>
                </div>

                <div>
                    <label class="text-[10px] font-bold text-gray-500 uppercase ml-1 tracking-widest">Location</label>
                    <input type="text" name="address" placeholder="Street Address" class="w-full mt-2 p-3 rounded-xl bg-white/5 border border-white/10 focus:border-blue-500 outline-none transition-all" required>
                    <input type="text" name="city" placeholder="City" class="w-full mt-3 p-3 rounded-xl bg-white/5 border border-white/10 focus:border-blue-500 outline-none transition-all" required>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-[10px] font-bold text-gray-500 uppercase ml-1">Monthly Price</label>
                        <input type="number" name="price" placeholder="₹" class="w-full mt-1 p-3 rounded-xl bg-white/5 border border-white/10 focus:border-blue-500 outline-none" required>
                    </div>
                    <div>
                        <label class="text-[10px] font-bold text-gray-500 uppercase ml-1">Seats Available</label>
                        <input type="number" name="available_seats" placeholder="Qty" class="w-full mt-1 p-3 rounded-xl bg-white/5 border border-white/10 focus:border-blue-500 outline-none" required>
                    </div>
                </div>

                <div>
                    <label class="text-[10px] font-bold text-gray-500 uppercase ml-1 tracking-widest">Cuisine Type</label>
                    <select name="veg_type" class="w-full mt-2 p-3 rounded-xl bg-white/5 border border-white/10 focus:border-blue-500 outline-none appearance-none cursor-pointer">
                        <option value="Veg" class="bg-[#0d0d0f]">Pure Veg</option>
                        <option value="Non-Veg" class="bg-[#0d0d0f]">Veg & Non-Veg</option>
                    </select>
                </div>

                <div class="relative group pt-4">
                    <div class="absolute inset-0 bg-blue-500 blur-md opacity-20 group-hover:opacity-40 transition-opacity"></div>
                    <button type="submit" class="relative w-full bg-blue-500 hover:bg-blue-400 text-black font-extrabold py-4 rounded-xl transition-all active:scale-95 uppercase tracking-wider">
                        Publish Mess
                    </button>
                </div>
            </form>

            <a href="{{ url_for('logout_page') }}" class="inline-flex items-center mt-10 text-gray-500 hover:text-red-400 text-xs font-bold uppercase tracking-widest transition-colors">
                <span class="mr-2">←</span> Log out session
            </a>
        </aside>

        <main class="w-2/3 p-12 overflow-y-auto">
            <header class="flex justify-between items-end mb-10">
                <div>
                    <h2 class="text-4xl font-bold text-white">Special Menu</h2>
                    <p class="text-gray-400 mt-2">Set today's special items to attract more subscribers.</p>
                </div>
                <div class="h-10 w-10 rounded-full bg-blue-500/20 border border-blue-500/50 flex items-center justify-center text-blue-400 font-bold">M</div>
            </header>

            <div class="glass p-10 rounded-[2.5rem] gradient-border">
                <form method="POST" class="space-y-8">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                        <div class="md:col-span-2">
                            <label class="text-xs font-bold text-gray-500 uppercase tracking-widest mb-3 block">Menu Active Date</label>
                            <input type="date" name="menu_date" class="w-full md:w-1/3 p-4 rounded-2xl bg-white/5 border border-white/10 focus:border-blue-500 outline-none transition-all text-white">
                        </div>

                        <div class="space-y-3">
                            <div class="flex items-center gap-3">
                                <span class="text-xl">🍳</span>
                                <label class="text-sm font-bold text-white uppercase tracking-tight">Breakfast</label>
                            </div>
                            <textarea name="breakfast" rows="3" class="w-full p-4 rounded-2xl bg-white/5 border border-white/10 focus:border-blue-500 outline-none transition-all" placeholder="E.g., Poha, Idli, Tea..."></textarea>
                        </div>

                        <div class="space-y-3">
                            <div class="flex items-center gap-3">
                                <span class="text-xl">🍛</span>
                                <label class="text-sm font-bold text-white uppercase tracking-tight">Lunch</label>
                            </div>
                            <textarea name="lunch" rows="3" class="w-full p-4 rounded-2xl bg-white/5 border border-white/10 focus:border-blue-500 outline-none transition-all" placeholder="E.g., Dal Tadka, Jeera Rice, Paneer..."></textarea>
                        </div>

                        <div class="md:col-span-2 space-y-3">
                            <div class="flex items-center gap-3">
                                <span class="text-xl">🍲</span>
                                <label class="text-sm font-bold text-white uppercase tracking-tight">Dinner</label>
                            </div>
                            <textarea name="dinner" rows="3" class="w-full p-4 rounded-2xl bg-white/5 border border-white/10 focus:border-blue-500 outline-none transition-all" placeholder="E.g., Chapati, Mixed Veg, Dessert..."></textarea>
                        </div>
                    </div>

                    <div class="pt-6 border-t border-white/5">
                        <button type="submit" class="bg-white/10 hover:bg-white/20 border border-white/10 text-white font-bold px-10 py-4 rounded-2xl transition-all active:scale-95">
                            Save Special Menu
                        </button>
                    </div>
                </form>
            </div>

            <div class="mt-12 grid grid-cols-3 gap-6">
                <div class="glass p-6 rounded-3xl border border-white/5">
                    <p class="text-gray-500 text-xs font-bold uppercase mb-1">Total Views</p>
                    <p class="text-2xl font-bold text-white">1,284</p>
                </div>
                <div class="glass p-6 rounded-3xl border border-white/5">
                    <p class="text-gray-500 text-xs font-bold uppercase mb-1">Subscriber Requests</p>
                    <p class="text-2xl font-bold text-blue-400">12</p>
                </div>
                <div class="glass p-6 rounded-3xl border border-white/5">
                    <p class="text-gray-500 text-xs font-bold uppercase mb-1">Rating</p>
                    <p class="text-2xl font-bold text-white">4.8 <span class="text-xs text-yellow-500">★</span></p>
                </div>
            </div>
        </main>
    </div>
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
