<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Login | StudentNest</title>

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">

    <!-- Original CSS (same as category.html) -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body class="antialiased bg-[#0d0d0f] text-white">

    <!-- Navbar (optional, same as category.html) -->
    <nav class="fixed top-0 w-full z-50 glass py-4 px-6 md:px-12 flex justify-between items-center">
        <div class="text-xl font-extrabold tracking-tighter uppercase">Student<span class="text-teal-400">Nest.</span></div>
        <div class="flex items-center gap-6">
            <a href="/category" class="bg-red-500/10 text-red-500 text-[10px] font-bold px-4 py-2 rounded-lg border border-red-500/20">
                Back to Category
            </a>
        </div>
    </nav>

    <!-- Main Content -->
    <section class="flex items-center justify-center min-h-screen px-6 pt-32">
        <div class="glass p-10 rounded-[3rem] w-full max-w-md border border-white/10 relative">

            <h2 class="text-3xl font-extrabold mb-2 text-center">Student Portal</h2>
            <p class="text-sm text-gray-500 mb-8 text-center italic">
                Login to find hostels & mess
            </p>

            <!-- Login Form -->
            <form method="POST" action="/student/dashboard" class="space-y-4">

                <!-- Name -->
                <div>
                    <label class="text-[10px] text-gray-500 font-black uppercase mb-2 block tracking-widest">
                        Full Name
                    </label>
                    <input type="text" name="name" required
                           class="w-full bg-white/5 p-4 rounded-xl border border-white/10 outline-none focus:border-teal-400 transition">
                </div>

                <!-- Email -->
                <div>
                    <label class="text-[10px] text-gray-500 font-black uppercase mb-2 block tracking-widest">
                        Email Address
                    </label>
                    <input type="email" name="email" required
                           class="w-full bg-white/5 p-4 rounded-xl border border-white/10 outline-none focus:border-teal-400 transition">
                </div>

                <!-- Phone -->
                <div>
                    <label class="text-[10px] text-gray-500 font-black uppercase mb-2 block tracking-widest">
                        Mobile Number
                    </label>
                    <input type="tel" name="phone" placeholder="+91..." required
                           class="w-full bg-white/5 p-4 rounded-xl border border-white/10 outline-none focus:border-teal-400 transition">
                </div>

                <!-- Password -->
                <div>
                    <label class="text-[10px] text-gray-500 font-black uppercase mb-2 block tracking-widest">
                        Password
                    </label>
                    <input type="password" name="password" required minlength="6"
                           class="w-full bg-white/5 p-4 rounded-xl border border-white/10 outline-none focus:border-teal-400 transition">
                </div>

                <!-- Submit -->
                <button type="submit"
                        class="w-full py-4 mt-4 rounded-xl font-black uppercase tracking-widest text-sm text-white student-gradient shadow-xl">
                    Login
                </button>

            </form>

            <!-- Register Hint -->
            <p class="text-[10px] text-gray-500 text-center mt-6">
                New student?
                <a href="/student/register" class="text-teal-400 font-bold hover:underline">
                    Create an account
                </a>
            </p>

        </div>
    </section>

</body>
</html>
