<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration | StudentNest</title>

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">

    <!-- Original CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body class="antialiased bg-[#0d0d0f] text-white">

    <!-- Full-screen wrapper -->
    <div class="min-h-screen flex items-center justify-center px-6">

        <!-- Glass Registration Card -->
        <div class="glass p-10 rounded-[3rem] w-full max-w-md border border-white/10 relative shadow-xl">

            <!-- Back Button -->
            <a href="/student/login" class="absolute top-6 left-6 text-gray-500 hover:text-white text-sm">
                ← Back to Login
            </a>

            <h2 class="text-3xl font-extrabold mb-2 text-center">
                Student Registration
            </h2>
            <p class="text-sm text-gray-500 mb-8 text-center italic">
                Create your account to find hostels & mess
            </p>

            <!-- Registration Form -->
            <form method="POST" action="/student/register/submit" class="space-y-4">

                <!-- Name -->
                <div>
                    <label class="text-[10px] text-gray-500 font-black uppercase mb-2 block tracking-widest">
                        Full Name
                    </label>
                    <input type="text" name="name" required
                        class="w-full bg-white/5 p-4 rounded-xl border border-white/10 outline-none focus:border-teal-400 transition">
                </div>

                <!-- Email -->
                <div>
                    <label class="text-[10px] text-gray-500 font-black uppercase mb-2 block tracking-widest">
                        Email Address
                    </label>
                    <input type="email" name="email" required
                        class="w-full bg-white/5 p-4 rounded-xl border border-white/10 outline-none focus:border-teal-400 transition">
                </div>

                <!-- Phone -->
                <div>
                    <label class="text-[10px] text-gray-500 font-black uppercase mb-2 block tracking-widest">
                        Mobile Number
                    </label>
                    <input type="tel" name="phone" placeholder="+91..." required
                        class="w-full bg-white/5 p-4 rounded-xl border border-white/10 outline-none focus:border-teal-400 transition">
                </div>

                <!-- Password -->
                <div>
                    <label class="text-[10px] text-gray-500 font-black uppercase mb-2 block tracking-widest">
                        Password
                    </label>
                    <input type="password" name="password" required minlength="6"
                        class="w-full bg-white/5 p-4 rounded-xl border border-white/10 outline-none focus:border-teal-400 transition">
                </div>

                <!-- Submit Button -->
                <button type="submit"
                    class="w-full py-4 mt-4 rounded-xl font-black uppercase tracking-widest text-sm text-white student-gradient shadow-xl">
                    Create Account
                </button>

            </form>

            <!-- Login Hint -->
            <p class="text-[10px] text-gray-500 text-center mt-6">
                Already have an account?
                <a href="/student/login" class="text-teal-400 font-bold hover:underline">
                    Login here
                </a>
            </p>

        </div>
    </div>

</body>
</html>
