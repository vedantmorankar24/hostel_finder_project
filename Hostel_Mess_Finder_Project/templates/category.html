<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STUDENTNEST | Secure Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #0d0d0f; overflow: hidden; }
        
        .glass {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
        }

        /* Unique Hover Effects for each role */
        .card-student:hover { border-color: #2dd4bf; box-shadow: 0 0 30px rgba(45, 212, 191, 0.15); transform: translateY(-10px); }
        .card-owner:hover { border-color: #818cf8; box-shadow: 0 0 30px rgba(129, 140, 248, 0.15); transform: translateY(-10px); }
        .card-mess:hover { border-color: #60a5fa; box-shadow: 0 0 30px rgba(96, 165, 250, 0.15); transform: translateY(-10px); }

        /* Floating Animation for Emojis */
        @keyframes float {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-10px) scale(1.1); }
        }
        .float-icon { animation: float 3s ease-in-out infinite; display: inline-block; }

        /* Background Dynamic Orbs */
        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            z-index: -1;
            opacity: 0.2;
            transition: all 1s ease;
        }
    </style>
</head>

<body class="flex items-center justify-center min-h-screen p-6">

    <div id="orb-teal" class="orb w-[400px] h-[400px] bg-teal-500 top-[-10%] left-[-10%]"></div>
    <div id="orb-indigo" class="orb w-[500px] h-[500px] bg-indigo-600 bottom-[-10%] right-[-10%]"></div>
    <div id="orb-blue" class="orb w-[300px] h-[300px] bg-blue-500 top-[20%] right-[10%] opacity-0"></div>

    <div class="max-w-5xl w-full text-center relative z-10">
        
        <div class="mb-16">
            <h1 class="text-5xl md:text-7xl font-extrabold mb-4 uppercase tracking-tighter text-white">
                Student<span class="text-teal-400">Nest</span><span class="text-white/20">.</span>
            </h1>
            <div class="flex items-center justify-center gap-4">
                <div class="h-[1px] w-12 bg-white/10"></div>
                <p class="text-gray-500 uppercase tracking-[0.4em] text-[10px] font-black">
                    Gateway to Secure Living
                </p>
                <div class="h-[1px] w-12 bg-white/10"></div>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-8 px-4">
            
            <a href="/student/login" 
               class="glass card-student p-10 rounded-[3rem] group">
                <div class="text-5xl mb-6 float-icon">🎓</div>
                <h3 class="text-2xl font-bold mb-3 text-white group-hover:text-teal-400 transition-colors">Student</h3>
                <p class="text-xs text-gray-500 leading-relaxed font-medium uppercase tracking-widest px-4">
                    Find Rooms & <br>Roommates
                </p>
                <div class="mt-8 opacity-0 group-hover:opacity-100 transition-all transform translate-y-2 group-hover:translate-y-0 text-teal-400 text-xs font-black">
                    ENTER PORTAL →
                </div>
            </a>

            <a href="/owner/login" 
               class="glass card-owner p-10 rounded-[3rem] group">
                <div class="text-5xl mb-6 float-icon" style="animation-delay: 0.5s;">🏠</div>
                <h3 class="text-2xl font-bold mb-3 text-white group-hover:text-indigo-400 transition-colors">Owner</h3>
                <p class="text-xs text-gray-500 leading-relaxed font-medium uppercase tracking-widest px-4">
                    Manage Hostels & <br>Tenants
                </p>
                <div class="mt-8 opacity-0 group-hover:opacity-100 transition-all transform translate-y-2 group-hover:translate-y-0 text-indigo-400 text-xs font-black">
                    DASHBOARD →
                </div>
            </a>

            <a href="{{ url_for('mess_login_page') }}" 
               class="glass card-mess p-10 rounded-[3rem] group">
                <div class="text-5xl mb-6 float-icon" style="animation-delay: 1s;">🍛</div>
                <h3 class="text-2xl font-bold mb-3 text-white group-hover:text-blue-400 transition-colors">Mess</h3>
                <p class="text-xs text-gray-500 leading-relaxed font-medium uppercase tracking-widest px-4">
                    Publish Menus & <br>Subscriptions
                </p>
                <div class="mt-8 opacity-0 group-hover:opacity-100 transition-all transform translate-y-2 group-hover:translate-y-0 text-blue-400 text-xs font-black">
                    CONTROL ROOM →
                </div>
            </a>
        </div>

        <p class="mt-20 text-[9px] text-gray-600 uppercase tracking-[0.5em] font-bold">
            © 2026 StudentNest Infrastructure • All Rights Reserved
        </p>
    </div>

</body>
</html>
