<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Owner Partnership | StudentNest</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #0d0d0f; }
        
        .glass {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        /* Ambient Indigo Glow */
        .bg-indigo-glow {
            background: radial-gradient(circle at 70% 30%, #1e1b4b 0%, #0d0d0f 100%);
        }

        /* Input animations */
        .input-focus:focus {
            border-color: #818cf8;
            background: rgba(129, 140, 248, 0.05);
            box-shadow: 0 0 20px rgba(129, 140, 248, 0.15);
        }

        /* Indigo Button Shimmer */
        .btn-indigo {
            background: linear-gradient(90deg, #6366f1, #4f46e5);
            position: relative;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
        }
        .btn-indigo:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(99, 102, 241, 0.4);
        }
        .btn-indigo::after {
            content: '';
            position: absolute;
            top: -50%; left: -50%; width: 200%; height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.1), transparent);
            transform: rotate(45deg);
            transition: 0.6s;
        }
        .btn-indigo:hover::after { left: 100%; }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
        .animate-entrance { animation: fadeIn 0.6s ease-out forwards; }
    </style>
</head>

<body class="min-h-screen flex items-center justify-center p-6 bg-indigo-glow relative overflow-hidden">

    <div class="fixed top-[-10%] left-[-10%] w-[500px] h-[500px] bg-indigo-500/10 blur-[120px] rounded-full -z-10"></div>

    <div class="glass p-10 md:p-14 rounded-[3.5rem] w-full max-w-lg animate-entrance relative">
        
        <div class="flex justify-center mb-8">
            <div class="w-14 h-14 bg-indigo-500/20 border border-indigo-500/30 rounded-2xl flex items-center justify-center shadow-inner">
                <span class="text-3xl">🏠</span>
            </div>
        </div>

        <div class="text-center mb-10">
            <h2 class="text-3xl font-black text-white tracking-tight uppercase">Owner <span class="text-indigo-400">Portal</span></h2>
            <p class="text-[11px] text-gray-500 mt-2 font-bold uppercase tracking-[0.2em]">Scale your rental business with StudentNest</p>
        </div>

        <form method="POST" action="{{ url_for('owner_register') }}" class="space-y-5">
            
            <div class="space-y-1">
                <label class="text-[9px] text-gray-500 font-black uppercase tracking-widest ml-1">Full Name</label>
                <input type="text" name="name" required placeholder="Proprietor Name"
                    class="w-full bg-white/5 p-4 rounded-2xl border border-white/10 text-white outline-none input-focus transition-all placeholder:text-gray-700">
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="space-y-1">
                    <label class="text-[9px] text-gray-500 font-black uppercase tracking-widest ml-1">Business Email</label>
                    <input type="email" name="email" required placeholder="owner@nest.com"
                        class="w-full bg-white/5 p-4 rounded-2xl border border-white/10 text-white outline-none input-focus transition-all placeholder:text-gray-700">
                </div>
                <div class="space-y-1">
                    <label class="text-[9px] text-gray-500 font-black uppercase tracking-widest ml-1">Contact No.</label>
                    <input type="tel" name="phone" required placeholder="+91..."
                        class="w-full bg-white/5 p-4 rounded-2xl border border-white/10 text-white outline-none input-focus transition-all placeholder:text-gray-700">
                </div>
            </div>

            <div class="space-y-1">
                <label class="text-[9px] text-gray-500 font-black uppercase tracking-widest ml-1">Secure Password</label>
                <input type="password" name="password" required minlength="6" placeholder="••••••••"
                    class="w-full bg-white/5 p-4 rounded-2xl border border-white/10 text-white outline-none input-focus transition-all placeholder:text-gray-700">
            </div>

            <button type="submit"
                class="w-full py-5 mt-4 rounded-2xl font-black uppercase tracking-[0.2em] text-xs text-white btn-indigo active:scale-95">
                Create Partner Account
            </button>
        </form>

        <div class="mt-10 pt-8 border-t border-white/5 text-center">
            <p class="text-[10px] text-gray-600 uppercase font-black tracking-widest">
                Already part of the ecosystem? 
                <a href="{{ url_for('owner_login') }}" class="text-indigo-400 hover:text-white transition-colors ml-1">Log in here</a>
            </p>
        </div>
    </div>

</body>
</html>
