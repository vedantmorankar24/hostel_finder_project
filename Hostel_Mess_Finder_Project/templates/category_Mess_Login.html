<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Mess Login | StudentNest</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #0d0d0f; overflow: hidden; }
        
        .glass {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        /* Ambient Azure Animation */
        .bg-blue-pulse {
            background: radial-gradient(circle at 50% 50%, #1e3a8a 0%, #0d0d0f 100%);
            animation: pulse-slow 10s ease-in-out infinite;
        }

        @keyframes pulse-slow {
            0%, 100% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.15); opacity: 0.8; }
        }

        /* Input field glow */
        .input-blue:focus {
            border-color: #60a5fa;
            box-shadow: 0 0 20px rgba(96, 165, 250, 0.15);
            background: rgba(255, 255, 255, 0.05);
        }

        /* Blue Button Shimmer */
        .btn-blue-shimmer {
            background: linear-gradient(90deg, #3b82f6, #2563eb);
            position: relative;
            overflow: hidden;
            transition: all 0.3s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .btn-blue-shimmer::after {
            content: '';
            position: absolute;
            top: -50%; left: -50%; width: 200%; height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.1), transparent);
            transform: rotate(45deg);
            transition: 0.6s;
        }

        .btn-blue-shimmer:hover::after { left: 100%; }
        .btn-blue-shimmer:hover { 
            transform: translateY(-2px); 
            box-shadow: 0 10px 25px rgba(59, 130, 246, 0.3); 
        }

        .animate-pop { animation: popIn 0.5s cubic-bezier(0.26, 0.53, 0.74, 1.48) forwards; }
        @keyframes popIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</head>

<body class="min-h-screen flex items-center justify-center p-6 relative">

    <div class="fixed inset-0 bg-blue-pulse -z-10"></div>
    <div class="fixed bottom-[-10%] right-[-10%] w-[500px] h-[500px] bg-blue-600/10 blur-[130px] rounded-full"></div>

    <div class="glass p-10 md:p-14 rounded-[3.5rem] w-full max-w-md relative animate-pop">
        
        <a href="{{ url_for('index_page') }}" class="absolute top-8 left-10 text-[10px] font-black text-gray-500 hover:text-blue-400 transition-colors uppercase tracking-[0.3em] flex items-center gap-2">
            <span>←</span> Back to Hub
        </a>

        <div class="text-center mb-10 mt-6">
            <div class="inline-flex items-center justify-center w-16 h-16 bg-blue-500/10 rounded-2xl mb-6 border border-blue-500/20">
                <span class="text-3xl">🍛</span>
            </div>
            <h2 class="text-3xl font-black text-white tracking-tighter uppercase">Mess <span class="text-blue-400">Login</span></h2>
            <p class="text-[11px] text-gray-500 mt-2 font-bold uppercase tracking-widest italic">Update your daily specials</p>
        </div>

        <form method="POST" action="{{ url_for('mess_login_page') }}" class="space-y-6">

            <div class="space-y-2">
                <label class="text-[9px] text-gray-500 font-black uppercase tracking-[0.2em] ml-1">Service Email</label>
                <input type="email" name="email" required
                    placeholder="mess-owner@nest.com"
                    class="w-full bg-white/5 p-4 rounded-2xl border border-white/10 text-white outline-none input-blue transition-all placeholder:text-gray-700">
            </div>

            <div class="space-y-2">
                <div class="flex justify-between items-center px-1">
                    <label class="text-[9px] text-gray-500 font-black uppercase tracking-[0.2em]">Management Key</label>
                    <a href="#" class="text-[9px] text-blue-500 hover:text-white uppercase font-bold tracking-tighter transition-colors">Reset Key</a>
                </div>
                <input type="password" name="password" required minlength="6"
                    placeholder="••••••••"
                    class="w-full bg-white/5 p-4 rounded-2xl border border-white/10 text-white outline-none input-blue transition-all placeholder:text-gray-700">
            </div>

            <button type="submit"
                class="w-full py-5 mt-2 rounded-2xl font-black uppercase tracking-[0.2em] text-xs text-white btn-blue-shimmer active:scale-95">
                Authorize Access
            </button>

        </form>

        <div class="mt-10 pt-8 border-t border-white/5 text-center">
            <p class="text-[10px] text-gray-600 uppercase font-bold tracking-[0.2em]">
                Want to join the kitchen? 
                <a href="{{ url_for('mess_register_page') }}" class="text-blue-400 hover:text-blue-300 ml-1 underline underline-offset-4 decoration-blue-500/30">Sign Up Now</a>
            </p>
        </div>

    </div>

    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
