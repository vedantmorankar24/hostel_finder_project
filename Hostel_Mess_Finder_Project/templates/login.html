<!DOCTYPE html>
<html>
<head><title>Login - StudentNest</title></head>
<body>
    <h1>StudentNest Login</h1>
    <form action="/login" method="POST">
        <label>Select Your Role:</label><br>
        <input type="radio" name="role" value="student" checked> Student
        <input type="radio" name="role" value="owner"> Hostel Owner
        <input type="radio" name="role" value="mess"> Mess Partner
        <br><br>

        <input type="text" name="name" placeholder="Full Name" required><br>
        <input type="email" name="email" placeholder="Email" required><br>
        <input type="tel" name="phone" placeholder="Phone Number" required><br>
        
        <button type="submit">Enter Portal</button>
    </form>
</body>
</html>
